<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobiGlas // Crafting & BP Database</title>
    <style>
        :root {
            --bg-color: #050914;
            --panel-bg: rgba(11, 19, 32, 0.85);
            --accent: #00e676; /* Verde para crafteo */
            --accent-hover: #1b5e20;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(5, 9, 20, 0.9), rgba(5, 9, 20, 0.9)), url('https://media.robertsspaceindustries.com/vj49y1371zexz/store_slideshow_large.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
        }
        header {
            background-color: rgba(5, 9, 20, 0.95);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--text-main); letter-spacing: 2px; }
        .logo span { color: var(--accent); font-size: 1rem; }
        main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        
        .search-bar { margin-bottom: 2rem; }
        .search-bar input {
            width: 100%; padding: 1rem; background: var(--panel-bg); border: 1px solid var(--border);
            color: var(--text-main); border-radius: 4px; font-size: 1.1rem; box-sizing: border-box;
        }
        .search-bar input:focus { outline: none; border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        .bp-card {
            background-color: var(--panel-bg); border: 1px solid var(--border); border-top: 3px solid var(--accent);
            border-radius: 6px; padding: 0; overflow: hidden; backdrop-filter: blur(5px);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .bp-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 230, 118, 0.1); border-color: var(--accent); }
        .card-image { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid var(--border); background: #000; }
        .card-content { padding: 1.5rem; }
        .bp-name { font-size: 1.2rem; color: #fff; margin: 0 0 0.4rem 0; }
        .bp-type { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; margin-bottom: 1rem; font-weight: bold;}
        .bp-detail { margin-bottom: 0.8rem; font-size: 0.9rem; }
        .label { color: var(--text-muted); display: block; font-size: 0.8rem; margin-bottom: 0.2rem;}
        .value { color: var(--text-main); font-weight: bold; }
        .mission-tag { display: inline-block; background: rgba(0, 230, 118, 0.1); color: var(--accent); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; margin-top: 0.5rem; border: 1px solid rgba(0, 230, 118, 0.3); }
        .materials { font-family: monospace; color: #ffb300; background: #000; padding: 0.5rem; border-radius: 4px; margin-top: 0.5rem;}
    </style>
</head>
<body>
    <header>
        <div class="logo">SC_DB <span>CRAFTING & BLUEPRINTS</span></div>
    </header>

    <main>
        <h1>Buscador de Blueprints (Crafteo)</h1>
        <p style="color: var(--text-muted);">Encuentra dónde conseguir los planos de fabricación y qué materiales requieren.</p>
        
        <div class="search-bar">
            <input type="text" id="bp-search" placeholder="Buscar blueprint por nombre, misión o ubicación..." onkeyup="filterBPs()">
        </div>
        <div id="bp-container" class="grid"></div>
    </main>

    <script>
        const bpDatabase = [
    {
        "name": "Blueprint: Morozov Aftershock Helmet",
        "type": "Armor Blueprint",
        "manufacturer": "RSI",
        "image": "https://starcitizen.tools/images/thumb/a/a2/Morozov_Helmet_Aftershock.jpg/300px-Morozov_Helmet_Aftershock.jpg",
        "materials": "30x RMC, 10x Oro, 5x Cobre",
        "location": "Búnkeres (Security Post)",
        "mission": "Defend Occupants / Evict Illegal Occupants"
    },
    {
        "name": "Blueprint: FS-9 LMG",
        "type": "Weapon Blueprint",
        "manufacturer": "Kastak Arms",
        "image": "https://starcitizen.tools/images/thumb/c/cd/FS-9_LMG.jpg/300px-FS-9_LMG.jpg",
        "materials": "45x Hierro, 20x Tungsteno, 5x RMC",
        "location": "Derelict Settlements / Outposts",
        "mission": "Bounty Hunter / Mercenary (Crusader)"
    },
    {
        "name": "Blueprint: Artimex Core",
        "type": "Armor Blueprint",
        "manufacturer": "Kastak Arms",
        "image": "https://starcitizen.tools/images/thumb/8/87/Artimex_Core_Hurston_Dynamics.jpg/300px-Artimex_Core_Hurston_Dynamics.jpg",
        "materials": "50x RMC, 25x Aluminio",
        "location": "Hurston Dynamics Facilities (Klescher / HD Entrances)",
        "mission": "Security Contractor Evaluation"
    },
    {
        "name": "Blueprint: P6-LR Sniper Rifle",
        "type": "Weapon Blueprint",
        "manufacturer": "Behring",
        "image": "https://starcitizen.tools/images/thumb/8/86/P6-LR_Sniper_Rifle.jpg/300px-P6-LR_Sniper_Rifle.jpg",
        "materials": "60x RMC, 15x Titanio, 2x Quantanium",
        "location": "Distribution Centers (MicroTech / Hurston)",
        "mission": "Raid / UGF Missions (Nivel Alto)"
    }
];

        function renderBPs(data) {
            const container = document.getElementById('bp-container');
            container.innerHTML = '';
            if(!data || data.length === 0) { container.innerHTML = '<p>No se encontraron blueprints.</p>'; return; }

            data.forEach(item => {
                container.innerHTML += `
                    <div class="bp-card">
                        <img src="${item.image}" alt="${item.name}" class="card-image" onerror="this.src='https://media.robertsspaceindustries.com/n14a84iowf8a4/store_slideshow_large.jpg'">
                        <div class="card-content">
                            <h2 class="bp-name">${item.name}</h2>
                            <div class="bp-type">${item.type} - ${item.manufacturer}</div>
                            
                            <div class="bp-detail">
                                <span class="label">Ubicación de dropeo:</span>
                                <span class="value">${item.location}</span>
                            </div>
                            
                            <div class="bp-detail">
                                <span class="label">Misión recomendada:</span>
                                <span class="mission-tag">🎯 ${item.mission}</span>
                            </div>

                            <div class="bp-detail">
                                <span class="label">Materiales de Crafteo:</span>
                                <div class="materials">⚙️ ${item.materials}</div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.filterBPs = function() {
            const query = document.getElementById('bp-search').value.toLowerCase();
            const filtered = bpDatabase.filter(b => 
                b.name.toLowerCase().includes(query) || 
                b.mission.toLowerCase().includes(query) ||
                b.location.toLowerCase().includes(query)
            );
            renderBPs(filtered);
        }

        // Inicializar
        renderBPs(bpDatabase);
    </script>
</body>
</html>
