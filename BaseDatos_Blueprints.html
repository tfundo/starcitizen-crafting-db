<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFUND0 // BLUEPRINTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f18;
      --bg-2: #101827;
      --panel: #111b2b;
      --panel-2: #162338;
      --border: #223654;
      --text: #f3f7ff;
      --text-soft: #a7b7d1;
      --blue: #4da3ff;
      --blue-2: #7ec1ff;
      --red: #ff5c73;
      --gold: #ffc857;
      --placeholder: #1b2840;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #060b12 100%);
      color: var(--text);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 15, 24, 0.95);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .title {
      font-family: Orbitron, sans-serif;
      font-size: 1.5rem;
      letter-spacing: 1px;
      color: var(--text);
    }
    .title span { color: var(--blue); }
    .back {
      color: var(--blue-2);
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-weight: 600;
    }
    .back:hover { background: var(--panel-2); }
    main { max-width: 1600px; margin: 0 auto; padding: 1.2rem; }
    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    input, select {
      width: 100%;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.9rem 1rem;
      border-radius: 12px;
      font-family: Inter, sans-serif;
    }
    .stats {
      color: var(--text-soft);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .tile {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.8rem;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      box-shadow: 0 6px 22px rgba(0,0,0,.18);
    }
    .tile:hover {
      transform: translateY(-3px);
      border-color: var(--blue);
      box-shadow: 0 10px 28px rgba(0,0,0,.24);
    }
    .imgbox {
      height: 190px;
      border-radius: 12px;
      background: var(--placeholder);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      overflow: hidden;
      margin-bottom: 0.8rem;
      border: 1px solid rgba(255,255,255,.04);
    }
    .imgbox img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .name {
      font-family: Orbitron, sans-serif;
      font-size: 1rem;
      line-height: 1.25;
      margin: 0 0 .45rem 0;
      color: white;
      min-height: 2.5em;
    }
    .mini {
      color: var(--text-soft);
      font-size: 0.85rem;
      min-height: 2.4em;
    }
    .tag {
      display: inline-block;
      padding: .28rem .55rem;
      border-radius: 999px;
      font-size: .74rem;
      margin-top: .65rem;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .weapon { background: rgba(255,92,115,.12); color: var(--red); }
    .armor { background: rgba(77,163,255,.14); color: var(--blue-2); }
    .ammo { background: rgba(255,200,87,.14); color: var(--gold); }
    .utility, .ship, .unknown { background: rgba(255,255,255,.08); color: var(--text-soft); }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 14, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 50;
      backdrop-filter: blur(8px);
    }
    .modal.open { display: flex; }
    .panel {
      width: min(950px, 100%);
      background: linear-gradient(180deg, #0f1827 0%, #101a2c 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 48px rgba(0,0,0,.45);
      padding: 1.1rem;
    }
    .panelHead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: .8rem;
      margin-bottom: 1rem;
    }
    .panelTitle {
      font-family: Orbitron, sans-serif;
      font-size: 1.4rem;
      color: white;
      margin: 0;
    }
    .closeBtn {
      background: rgba(255,255,255,.03);
      color: var(--red);
      border: 1px solid rgba(255,92,115,.35);
      padding: .6rem .85rem;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .closeBtn:hover { background: rgba(255,92,115,.08); }
    .detailGrid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1rem;
    }
    .bigImage {
      height: 300px;
      border-radius: 16px;
      background: var(--placeholder);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.04);
    }
    .bigImage img { width: 100%; height: 100%; object-fit: cover; display:block; }
    .block {
      margin-bottom: 1rem;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 14px;
      padding: .9rem;
    }
    .label {
      color: var(--blue-2);
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: .5rem;
      font-weight: 700;
    }
    .missionLine, .costLine {
      padding: .24rem 0;
      color: var(--text);
      font-size: .95rem;
    }
    .small { color: var(--text-soft); font-size: .9rem; }
    @media (max-width: 900px) {
      .toolbar { grid-template-columns: 1fr; }
      .detailGrid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="title">TFUND<span>0</span> // Blueprints</div>
  <a class="back" href="index.html">← Volver</a>
</header>
<main>
  <div class="toolbar">
    <input id="search" placeholder="Buscar objeto o misión...">
    <select id="categoryFilter">
      <option value="">Todas las categorías</option>
      <option value="weapon">Armas</option>
      <option value="armor">Armaduras</option>
      <option value="ammo">Munición</option>
      <option value="utility">Utilidad</option>
      <option value="ship">Naves</option>
      <option value="unknown">Otros</option>
    </select>
    <select id="sortBy">
      <option value="name">Ordenar por nombre</option>
      <option value="mission">Ordenar por misión</option>
      <option value="category">Ordenar por categoría</option>
    </select>
  </div>
  <div class="stats" id="stats">Cargando...</div>
  <div class="grid" id="grid"></div>
</main>

<div class="modal" id="modal">
  <div class="panel">
    <div class="panelHead">
      <h2 class="panelTitle" id="mTitle">Objeto</h2>
      <button class="closeBtn" id="closeBtn">Cerrar</button>
    </div>
    <div class="detailGrid">
      <div class="bigImage" id="mImage">Imagen pendiente</div>
      <div>
        <div class="block"><div class="label">Categoría</div><div id="mCategory"></div></div>
        <div class="block"><div class="label">Misiones donde puede salir</div><div id="mMissions"></div></div>
        <div class="block"><div class="label">Materiales de crafteo</div><div id="mCosts"></div></div>
        <div class="block"><div class="label">Tiempo de crafteo</div><div id="mTime"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = 'data/blueprints_missions_clean.json';
let RAW = [];
let GROUPED = [];

// Solo imágenes confirmadas o placeholder. Nada de URLs dudosas que parpadeen.
const imgMap = {
  'P6-LR': 'https://starcitizen.tools/images/thumb/8/86/P6-LR_Sniper_Rifle.jpg/300px-P6-LR_Sniper_Rifle.jpg',
  'Ripper SMG': 'https://starcitizen.tools/images/thumb/7/7d/Ripper_SMG.jpg/300px-Ripper_SMG.jpg',
  'Gemini R97': 'https://starcitizen.tools/images/thumb/8/86/BR-2_Shotgun.jpg/300px-BR-2_Shotgun.jpg',
  'Gemini R97 Magazine': 'https://starcitizen.tools/images/thumb/8/86/BR-2_Shotgun.jpg/300px-BR-2_Shotgun.jpg'
};

function norm(s){ return (s || '').toLowerCase(); }
function uniq(arr){ return [...new Set(arr.filter(Boolean))]; }

function normalizeDisplayName(name){
  if(!name) return 'Objeto desconocido';
  return name
    .replace(/^Gemini Shotgun$/i, 'Gemini R97')
    .replace(/^Gemini Shotgun Magazine$/i, 'Gemini R97 Magazine')
    .replace(/^Armadura Kastak Heavy Core$/i, 'Monde Heavy Core')
    .replace(/^Casco Kastak Heavy$/i, 'Monde Heavy Helmet')
    .replace(/^Brazos Kastak Heavy$/i, 'Monde Heavy Arms')
    .replace(/^Piernas Kastak Heavy$/i, 'Monde Heavy Legs');
}

function groupData(data){
  const map = new Map();
  for (const item of data) {
    const key = normalizeDisplayName(item.displayName || item.rawBlueprintInternalName || 'Sin nombre');
    if (!map.has(key)) {
      map.set(key, {
        displayName: key,
        category: item.category || 'unknown',
        craftTime: item.craftTime || 'N/D',
        image: item.image || imgMap[key] || '',
        missions: [],
        costs: []
      });
    }
    const row = map.get(key);
    row.missions.push(item.missionName);
    for (const c of (item.costs || [])) row.costs.push(`${c.material}: ${c.amountSCU} SCU`);
  }
  return [...map.values()].map(x => ({ ...x, missions: uniq(x.missions), costs: uniq(x.costs) }));
}

function safeImage(url, alt){
  if(!url) return 'Imagen pendiente';
  return `<img src="${url}" alt="${alt}" onerror="this.remove(); this.parentNode.textContent='Imagen pendiente';">`;
}

function render(data){
  const grid = document.getElementById('grid');
  document.getElementById('stats').textContent = `Mostrando ${data.length} objetos únicos`;
  if (!data.length) {
    grid.innerHTML = '<div class="name" style="color:var(--red)">Sin resultados</div>';
    return;
  }
  grid.innerHTML = data.slice(0, 500).map((item, idx) => `
    <div class="tile" data-idx="${idx}">
      <div class="imgbox">${safeImage(item.image, item.displayName)}</div>
      <h3 class="name">${item.displayName}</h3>
      <div class="mini">${item.missions[0] || 'Misión desconocida'}</div>
      <div class="tag ${item.category || 'unknown'}">${item.category || 'unknown'}</div>
    </div>
  `).join('');

  [...document.querySelectorAll('.tile')].forEach(tile => {
    tile.addEventListener('click', () => openModal(data[Number(tile.dataset.idx)]));
  });
}

function openModal(item){
  document.getElementById('mTitle').textContent = item.displayName;
  document.getElementById('mCategory').innerHTML = `<span class="tag ${item.category || 'unknown'}">${item.category || 'unknown'}</span>`;
  document.getElementById('mTime').textContent = item.craftTime || 'N/D';
  document.getElementById('mMissions').innerHTML = item.missions.length ? item.missions.map(m => `<div class="missionLine">• ${m}</div>`).join('') : '<div class="small">Sin misión resuelta</div>';
  document.getElementById('mCosts').innerHTML = item.costs.length ? item.costs.map(c => `<div class="costLine">• ${c}</div>`).join('') : '<div class="small">Sin materiales resueltos</div>';
  document.getElementById('mImage').innerHTML = safeImage(item.image, item.displayName);
  document.getElementById('modal').classList.add('open');
}

function applyFilters(){
  const q = norm(document.getElementById('search').value);
  const cat = document.getElementById('categoryFilter').value;
  const sortBy = document.getElementById('sortBy').value;

  let data = GROUPED.filter(item => {
    const hay = [item.displayName, item.category, ...item.missions].join(' ').toLowerCase();
    return (!q || hay.includes(q)) && (!cat || item.category === cat);
  });

  data.sort((a,b) => {
    const av = sortBy === 'mission' ? (a.missions[0] || '') : sortBy === 'category' ? (a.category || '') : (a.displayName || '');
    const bv = sortBy === 'mission' ? (b.missions[0] || '') : sortBy === 'category' ? (b.category || '') : (b.displayName || '');
    return av.localeCompare(bv);
  });

  render(data);
}

fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    RAW = data;
    GROUPED = groupData(RAW);
    applyFilters();
  })
  .catch(err => {
    document.getElementById('stats').textContent = 'Error cargando blueprints';
    console.error(err);
  });

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('sortBy').addEventListener('change', applyFilters);
document.getElementById('closeBtn').addEventListener('click', () => document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') e.currentTarget.classList.remove('open'); });
</script>
</body>
</html>
