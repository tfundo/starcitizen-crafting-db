<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Citizen Companion // Blueprints</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0c0b0f; --panel:#18171f; --panel-2:#1f1d27; --border:#3b2d1d; --text:#f5f1e8; --text-soft:#b9b0a2; --blue:#3f88ff; --green:#39ff14; --red:#c7392f; --gold:#b9893b; --gold-soft:#d0a45c; --placeholder:#201d24; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,sans-serif;background:radial-gradient(circle at top,#1a1620 0%,var(--bg) 45%,#08070b 100%);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(12,11,15,.94);border-bottom:1px solid rgba(185,137,59,.25);backdrop-filter:blur(10px)}
    .topbar{max-width:1400px;margin:0 auto;padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:.85rem}.brand img{width:54px;height:54px;border-radius:50%;object-fit:cover;background:#0f1117}.logo-main{border:1px solid rgba(57,255,20,.25)}.logo-org{border:1px solid rgba(185,137,59,.35)}.title-wrap h1{margin:0;font-family:Orbitron,sans-serif;font-size:1.25rem}.title-wrap .sub{color:var(--text-soft);font-size:.85rem}.controls{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}.controls a,.controls button{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid rgba(185,137,59,.18);color:var(--text);padding:.75rem .95rem;border-radius:12px;text-decoration:none;font-weight:600;cursor:pointer}.controls button.active{border-color:rgba(63,136,255,.35);color:var(--blue)}
    main{max-width:1400px;margin:0 auto;padding:1.2rem 1.2rem 2rem 1.2rem}.toolbar{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem} input,select{width:100%;background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);color:var(--text);border:1px solid rgba(185,137,59,.18);padding:.9rem 1rem;border-radius:12px;font-family:Inter,sans-serif}.stats{color:var(--text-soft);margin-bottom:1rem}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1rem}.tile{padding:.8rem;cursor:pointer;border-radius:18px;background:linear-gradient(180deg,rgba(24,23,31,.95) 0%,rgba(17,16,23,.98) 100%);border:1px solid rgba(185,137,59,.16);transition:.18s ease}.tile:hover{transform:translateY(-2px);border-color:rgba(63,136,255,.32)}.imgbox{height:190px;border-radius:14px;background:var(--placeholder);display:flex;align-items:center;justify-content:center;color:var(--text-soft);overflow:hidden;margin-bottom:.8rem;border:1px solid rgba(255,255,255,.04)}.imgbox img{width:100%;height:100%;object-fit:cover;display:block}.name{font-family:Orbitron,sans-serif;font-size:1rem;line-height:1.25;margin:0 0 .45rem 0;color:white;min-height:2.5em}.mini{color:var(--text-soft);font-size:.85rem;min-height:2.4em}.modal{position:fixed;inset:0;background:rgba(4,8,14,.8);display:none;align-items:center;justify-content:center;padding:1rem;z-index:50;backdrop-filter:blur(8px)}.modal.open{display:flex}.panel{width:min(980px,100%);background:linear-gradient(180deg,#17141c 0%,#141119 100%);border:1px solid rgba(185,137,59,.18);border-radius:22px;box-shadow:0 18px 48px rgba(0,0,0,.45);padding:1.1rem}.panelHead{display:flex;justify-content:space-between;align-items:center;gap:1rem;border-bottom:1px solid rgba(185,137,59,.12);padding-bottom:.8rem;margin-bottom:1rem}.panelTitle{font-family:Orbitron,sans-serif;font-size:1.35rem;color:white;margin:0}.detailGrid{display:grid;grid-template-columns:300px 1fr;gap:1rem}.bigImage{height:300px;border-radius:16px;background:var(--placeholder);display:flex;align-items:center;justify-content:center;color:var(--text-soft);overflow:hidden;border:1px solid rgba(255,255,255,.04)}.bigImage img{width:100%;height:100%;object-fit:cover;display:block}.block{margin-bottom:1rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:.9rem}.label{color:var(--blue);font-size:.82rem;text-transform:uppercase;letter-spacing:.8px;margin-bottom:.5rem;font-weight:700}.missionLine,.costLine{padding:.24rem 0;color:var(--text);font-size:.95rem}.small{color:var(--text-soft);font-size:.9rem}@media(max-width:900px){.toolbar{grid-template-columns:1fr}.detailGrid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">
      <img src="logo.jpg" alt="Personal logo" class="logo-main">
      <img src="org_logo.jpg" alt="ORG logo" class="logo-org">
      <div class="title-wrap"><h1>Star Citizen Companion</h1><div class="sub" id="subtitle">Blueprint recipes database</div></div>
    </div>
    <div class="controls">
      <a href="index.html" id="nav-home">Home</a>
      <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
      <button id="lang-es" onclick="setLang('es')">ES</button>
    </div>
  </div>
</header>
<main>
  <div class="toolbar">
    <input id="search" placeholder="Search object or mission...">
    <select id="sortBy"><option value="name">Sort by name</option><option value="mission">Sort by mission</option></select>
  </div>
  <div class="stats" id="stats">Loading blueprints...</div>
  <div class="grid" id="grid"></div>
</main>
<div class="modal" id="modal"><div class="panel"><div class="panelHead"><h2 class="panelTitle" id="mTitle">Object</h2><button class="controls" style="padding:0;border:none;background:none"><button onclick="document.getElementById('modal').classList.remove('open')">Close</button></button></div><div class="detailGrid"><div class="bigImage" id="mImage">Image pending</div><div><div class="block"><div class="label" id="label-cat">Category</div><div id="mCategory"></div></div><div class="block"><div class="label" id="label-missions">Missions where it may appear</div><div id="mMissions"></div></div><div class="block"><div class="label" id="label-costs">Crafting materials</div><div id="mCosts"></div></div><div class="block"><div class="label" id="label-time">Craft time</div><div id="mTime"></div></div></div></div></div></div>
<script>
const DATA_URL='data/db_blueprints.json';
const MISSIONS_URL='data/db_misiones_recompensas.json';
let BLUEPRINTS=[];
let MISSIONS=[];
let GROUPED=[];
const i18n={en:{subtitle:'Blueprint recipes database',home:'Home',search:'Search object or mission...',sortName:'Sort by name',sortMission:'Sort by mission',stats:(n)=>`Showing ${n} unique objects`,unknownMission:'Unknown mission',pending:'Image pending',cat:'Category',missions:'Missions where it may appear',costs:'Crafting materials',time:'Craft time',close:'Close'},es:{subtitle:'Base de datos de recipes de blueprints',home:'Inicio',search:'Buscar objeto o misión...',sortName:'Ordenar por nombre',sortMission:'Ordenar por misión',stats:(n)=>`Mostrando ${n} objetos únicos`,unknownMission:'Misión desconocida',pending:'Imagen pendiente',cat:'Categoría',missions:'Misiones donde puede salir',costs:'Materiales de crafteo',time:'Tiempo de crafteo',close:'Cerrar'}}; let currentLang='en';
function setLang(lang){currentLang=lang; const t=i18n[lang]; document.getElementById('subtitle').textContent=t.subtitle; document.getElementById('nav-home').textContent=t.home; document.getElementById('search').placeholder=t.search; document.querySelector('#sortBy option[value="name"]').textContent=t.sortName; document.querySelector('#sortBy option[value="mission"]').textContent=t.sortMission; document.getElementById('label-cat').textContent=t.cat; document.getElementById('label-missions').textContent=t.missions; document.getElementById('label-costs').textContent=t.costs; document.getElementById('label-time').textContent=t.time; document.getElementById('lang-en').classList.toggle('active',lang==='en'); document.getElementById('lang-es').classList.toggle('active',lang==='es'); applyFilters();}
function uniq(arr){return[...new Set(arr.filter(Boolean))]} function norm(s){return(s||'').toLowerCase();}
function groupData(blueprints, missions){
  const map=new Map();
  // 1. Initialize blueprints
  for(const bp of blueprints){
    const key = bp.id;
    if(!map.has(key)){
      map.set(key, {
        id: bp.id,
        displayName: bp.realName || bp.name,
        category: bp.category || 'unknown',
        craftTime: 'N/D', // Si estuviera en JSON lo pintaríamos
        image: '',
        missions: [],
        costs: bp.materials.map(m => `${m.name || m.resource}: ${m.amount} SCU`)
      });
    }
  }
  
  // 2. Map missions to blueprints
  for(const m of missions){
    for(const r of m.rewards){
      if(r.type === 'blueprint_pool' && r.blueprints){
        for(const poolBp of r.blueprints){
          const target = map.get(poolBp.id);
          if(target){
            target.missions.push(m.realName || m.name);
          }
        }
      }
    }
  }

  return [...map.values()].map(x => ({...x, missions: uniq(x.missions)}));
}
function safeImage(url,alt){if(!url)return i18n[currentLang].pending; return `<img src="${url}" alt="${alt}" onerror="this.remove(); this.parentNode.textContent='${i18n[currentLang].pending}';">`;}
function render(data){const grid=document.getElementById('grid'); document.getElementById('stats').textContent=i18n[currentLang].stats(data.length); grid.innerHTML=data.slice(0,500).map((item,idx)=>`<div class="tile" data-idx="${idx}"><div class="imgbox">${safeImage(item.image,item.displayName)}</div><h3 class="name">${item.displayName}</h3><div class="mini">${item.missions[0]||i18n[currentLang].unknownMission}</div></div>`).join(''); [...document.querySelectorAll('.tile')].forEach(tile=>tile.addEventListener('click',()=>openModal(data[Number(tile.dataset.idx)])));}
function openModal(item){document.getElementById('mTitle').textContent=item.displayName; document.getElementById('mCategory').textContent=item.category||'unknown'; document.getElementById('mTime').textContent=item.craftTime||'N/D'; document.getElementById('mMissions').innerHTML=item.missions.length?item.missions.map(m=>`<div class="missionLine">• ${m}</div>`).join(''):`<div class="small">${i18n[currentLang].unknownMission}</div>`; document.getElementById('mCosts').innerHTML=item.costs.length?item.costs.map(c=>`<div class="costLine">• ${c}</div>`).join(''):'<div class="small">N/D</div>'; document.getElementById('mImage').innerHTML=safeImage(item.image,item.displayName); document.getElementById('modal').classList.add('open');}
function applyFilters(){const q=norm(document.getElementById('search').value); const sortBy=document.getElementById('sortBy').value; let data=GROUPED.filter(item=>[item.displayName,...item.missions].join(' ').toLowerCase().includes(q)); data.sort((a,b)=>{const av=sortBy==='mission'?(a.missions[0]||''):(a.displayName||''); const bv=sortBy==='mission'?(b.missions[0]||''):(b.displayName||''); return av.localeCompare(bv);}); render(data);} 

Promise.all([
  fetch(DATA_URL).then(r=>r.json()),
  fetch(MISSIONS_URL).then(r=>r.json())
]).then(([bps, mss])=>{
  BLUEPRINTS=bps; 
  MISSIONS=mss;
  GROUPED=groupData(BLUEPRINTS, MISSIONS); 
  setLang('en');
}).catch(err=>{document.getElementById('stats').textContent='Error loading database'; console.error(err);}); 

document.getElementById('search').addEventListener('input',applyFilters); document.getElementById('sortBy').addEventListener('change',applyFilters); document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal') e.currentTarget.classList.remove('open');});
</script>
</body>
</html>
