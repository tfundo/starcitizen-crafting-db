    <style>
        :root {
            --bg-color: #050914;
            --panel-bg: rgba(11, 19, 32, 0.85);
            --accent: #ffb300;
            --accent-hover: #ffca28;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(5, 9, 20, 0.9), rgba(5, 9, 20, 0.9)), url('https://media.robertsspaceindustries.com/vj49y1371zexz/store_slideshow_large.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
        }
        header {
            background-color: rgba(5, 9, 20, 0.95);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--text-main); letter-spacing: 2px; }
        .logo span { color: var(--accent); font-size: 1rem; }
        main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .tab-btn { 
            background: transparent; border: 1px solid var(--border); color: var(--text-muted); 
            padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 4px; font-size: 1rem; transition: all 0.3s;
        }
        .tab-btn:hover { border-color: var(--accent); color: var(--text-main); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-bar { margin-bottom: 2rem; }
        .search-bar input {
            width: 100%; padding: 1rem; background: var(--panel-bg); border: 1px solid var(--border);
            color: var(--text-main); border-radius: 4px; font-size: 1.1rem; box-sizing: border-box;
        }
        .search-bar input:focus { outline: none; border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        .ship-card {
            background-color: var(--panel-bg); border: 1px solid var(--border); border-top: 3px solid var(--accent);
            border-radius: 6px; padding: 0; overflow: hidden; backdrop-filter: blur(5px);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .ship-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 179, 0, 0.1); border-color: var(--accent); }
        .card-image { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid var(--border); background: #000; }
        .card-content { padding: 1.5rem; }
        .ship-name { font-size: 1.3rem; color: #fff; margin: 0 0 0.4rem 0; }
        .ship-manufacturer { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; margin-bottom: 1rem; font-weight: bold;}
        .ship-detail { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .label { color: var(--text-muted); }
        .value { color: var(--text-main); font-weight: bold; text-align: right;}
        .mission-tag { display: inline-block; background: rgba(255, 179, 0, 0.1); color: var(--accent); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; margin-top: 1rem; border: 1px solid rgba(255, 179, 0, 0.3); }
    </style>
</head>

        <div class="logo">SC_DB <span>INTERACTIVE</span></div>
    </header>

        </div>

        <div id="ships-tab" class="tab-content active">
            <div class="search-bar">

            </div>
            <div id="ship-container" class="grid"></div>
        </div>

        <div id="armors-tab" class="tab-content">

            </div>
            <div id="armor-container" class="grid"></div>
        </div>
    </main>

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function renderShips(data) {
            const container = document.getElementById('ship-container');
            container.innerHTML = '';
            if(!data || data.length === 0) { container.innerHTML = '<p>No hay naves.</p>'; return; }

            data.forEach(ship => {
                const priceText = typeof ship.price === 'number' ? new Intl.NumberFormat('es-ES').format(ship.price) + ' aUEC' : ship.price;
                const imgFallback = `https://starcitizen.tools/images/thumb/a/a2/${encodeURIComponent(ship.name.replace(/ /g, '_'))}.jpg/300px-${encodeURIComponent(ship.name.replace(/ /g, '_'))}.jpg`;
                
                container.innerHTML += `
                    <div class="ship-card">
                        <img src="${imgFallback}" class="card-image" onerror="this.src='https://media.robertsspaceindustries.com/vj49y1371zexz/store_slideshow_large.jpg'">
                        <div class="card-content">
                            <h2 class="ship-name">${ship.name}</h2>
                            <div class="ship-manufacturer">${ship.manufacturer}</div>
                            <div class="ship-detail"><span class="label">Rol:</span><span class="value">${ship.role || 'N/A'}</span></div>
                            <div class="ship-detail"><span class="label">Tripulación:</span><span class="value">${ship.crew || 'N/A'}</span></div>
                            <div class="ship-detail"><span class="label">Vel. SCM:</span><span class="value">${ship.speed || 'N/A'} m/s</span></div>
                            <div class="ship-detail"><span class="label">Precio:</span><span class="value" style="color:var(--accent);">${priceText}</span></div>
                        </div>
                    </div>`;
            });
        }

        function renderArmors(data) {
            const container = document.getElementById('armor-container');
            container.innerHTML = '';
            if(!data || data.length === 0) { container.innerHTML = '<p>No hay items.</p>'; return; }

            data.forEach(item => {
                container.innerHTML += `
                    <div class="ship-card">
                        <img src="${item.image}" alt="${item.name}" class="card-image" onerror="this.src='https://media.robertsspaceindustries.com/n14a84iowf8a4/store_slideshow_large.jpg'">
                        <div class="card-content">
                            <h2 class="ship-name" style="font-size: 1.1rem;">${item.name}</h2>
                            <div class="ship-manufacturer">${item.type} - ${item.manufacturer}</div>
                            <div class="ship-detail" style="flex-direction: column; align-items: flex-start; gap: 0.3rem;">
                                <span class="label">Obtención:</span>
                                <span class="value" style="text-align: left;">${item.location || 'Verso'}</span>
                            </div>
                            <span class="mission-tag">📦 Blueprint / Loot</span>
                        </div>
                    </div>`;
            });
        }

        window.filterShips = function() {
            const query = document.getElementById('ship-search').value.toLowerCase();
            const filtered = shipsDatabase.filter(s => s.name.toLowerCase().includes(query) || s.manufacturer.toLowerCase().includes(query));
            renderShips(filtered);
        }

        window.filterArmors = function() {
            const query = document.getElementById('armor-search').value.toLowerCase();
            const filtered = armorDatabase.filter(a => a.name.toLowerCase().includes(query) || a.type.toLowerCase().includes(query));
            renderArmors(filtered);
        }

        // Inicializar
        renderShips(shipsDatabase);
        renderArmors(armorDatabase);
    </script>
