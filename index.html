<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobiGlas // Ship Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">mobiGlas DB <span>v1.0</span></div>
        <nav>
            <ul>
                <li><a href="#" class="active">Naves</a></li>
                <li><a href="#">Componentes</a></li>
                <li><a href="#">Minería</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('ships')">Naves</button>
            <button class="tab-btn" onclick="showTab('armors')">Armaduras & Blueprints (Loot)</button>
        </div>

        <div id="ships-tab" class="tab-content active">
            <h1>Directorio de Naves Espaciales</h1>
            <p class="subtitle">Datos extraídos en tiempo real del último parche</p>
            <div id="ship-container" class="grid">
                <div class="loading">Cargando base de datos...</div>
            </div>
        </div>

        <div id="armors-tab" class="tab-content" style="display: none;">
            <h1>Buscador de Blueprints y Loot</h1>
            <p class="subtitle">Encuentra en qué misiones o búnkeres caen las armaduras</p>
            
            <div class="search-bar">
                <input type="text" id="armor-search" placeholder="Buscar armadura o blueprint... (Ej. Defiance, Morozov)" onkeyup="filterArmors()">
            </div>
            
            <div id="armor-container" class="grid">
                <!-- Se llenará con JS -->
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
